<!DOCTYPE html>
<html>
<head>
<title>MyMusic</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

<h2>🎧 MyMusic</h2>

<nav>
<a href="#explore">Explore</a>
<a href="#library">Library</a>
<a href="#playlist">Playlist</a>
<a href="index.html">Logout</a>
</nav>

</header>


<section id="explore" class="section">

<h2>Explore</h2>

<div class="cards">

<div class="card">
<img src="cover1.jpg">
<h3>Relax Beats</h3>
<button onclick="playSong()">Play</button>
</div>

<div class="playlist-card">
    <img class="playlist-img" src="kani.jpg" alt="kani playlist">
    <h3>Oks Lang Ako</h3>
    <p>1 Song</p>

   
    <audio controls>
        <source src="okslang.mp3" type="audio/mpeg">
    </audio>

</div>

</div>

</section>


<section id="library" class="section">

<h2>Your Library</h2>

<p>Saved songs will appear here.</p>

</section>


<section id="playlist" class="section">

<h2>Your Playlist</h2>

<div class="cards">

<div class="card">
<h3>Chill Playlist</h3>
<p>1 Song</p>
</div>


</div>

</section>



<footer class="player">

<audio id="audio" controls>
<source src="song1.mp3" type="audio/mpeg">
</audio>

</footer>


<script src="script.js"></script>

</body>
</html>
